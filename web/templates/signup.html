{% extends "_base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<div class="panel" style="max-width:420px; margin:40px auto;">
  <h2>Create your account</h2>
  <form method="post" action="/auth/signup">
    <div style="margin-bottom:12px;"><label>Your name</label><input type="text" name="name" /></div>
    <div style="margin-bottom:12px;"><label>Email</label><input type="email" name="email" required /></div>
    <div style="margin-bottom:12px;"><label>Password (min 8 chars)</label><input type="password" name="password" required minlength="8" /></div>
    <button type="submit">Create account</button>
    <div class="muted" style="margin-top:12px;">Already a member? <a href="/auth/login">Log in</a></div>
  </form>
</div>
{% endblock %}
