{% extends "_base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="panel" style="max-width:420px; margin:40px auto;">
  <h2>Log in</h2>
  <form method="post" action="/auth/login">
    <div style="margin-bottom:12px;"><label>Email</label><input type="email" name="email" required /></div>
    <div style="margin-bottom:12px;"><label>Password</label><input type="password" name="password" required /></div>
    <button type="submit">Log in</button>
    <div class="muted" style="margin-top:12px;">No account? <a href="/auth/signup">Sign up</a></div>
  </form>
</div>
{% endblock %}
